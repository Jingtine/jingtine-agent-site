  <div class="page-header">
    <div class="section-label">Wiki</div>
    <h1>知识维基</h1>
    <p>Personal knowledge base — search, browse, and explore.</p>
  </div>

  <!-- List view -->
  <section class="section" id="wiki-list-view">
    <div style="margin-bottom: 24px;">
      <input type="text" id="wiki-search" placeholder="Search pages..."
        style="width:100%;max-width:400px;padding:8px 14px;font-size:14px;font-family:var(--font-sans);border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text);outline:none;">
    </div>

    <div class="blog-tags" id="wiki-category-tags"></div>

    <div class="article-list" id="wiki-article-list">
      <p style="text-align:center;color:var(--color-text-muted);padding:24px;">Loading wiki...</p>
    </div>
  </section>

  <!-- Detail view -->
  <section class="section" id="wiki-detail-view" style="display:none;">
    <div style="margin-bottom: 24px;">
      <button class="btn btn-outline" id="wiki-back">&larr; Back to Wiki</button>
    </div>
    <h2 id="wiki-detail-title" style="font-size:24px;font-weight:700;color:var(--color-text);margin-bottom:8px;"></h2>
    <p id="wiki-detail-meta" style="font-size:13px;color:var(--color-text-muted);margin-bottom:32px;"></p>
    <div class="article-detail" id="wiki-detail-body"></div>
  </section>

  <footer class="footer">

    </div>
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/marked.min.js"></script>
  <script src="js/wiki.js"></script>
