<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RSS Reader — aggregated articles from curated sources.">
  <title>Reader — Jingtine</title>
  <link rel="stylesheet" href="styles.css?v=20260712-2">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jingtine</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="papers.html">Research</a>
        <a href="wiki.html">Wiki</a>
        <a href="reader.html" class="active">Reader</a>
        <a href="assistant.html">Assistant</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="section-label">Reader</div>
    <h1>RSS Reader</h1>
    <p>Curated subscription sources.</p>
  </div>

  <!-- Source list view -->
  <section class="section" id="reader-source-view">
    <!-- Stats bar -->
    <div class="contact-card" style="padding:16px 24px;margin-bottom:20px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;">
      <span style="font-size:13px;color:var(--color-text-muted);" id="stats-sources"></span>
      <span style="font-size:13px;color:var(--color-text-muted);" id="stats-articles"></span>
      <span style="font-size:13px;color:var(--color-text-muted);" id="stats-updated"></span>
    </div>

    <!-- Search -->
    <div style="margin-bottom:20px;">
      <input type="text" id="source-search" placeholder="Search sources..."
        style="width:100%;max-width:360px;padding:8px 14px;font-size:14px;font-family:var(--font-sans);border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text);outline:none;">
    </div>

    <div class="home-skills-grid" id="source-cards">
      <p style="text-align:center;color:var(--color-text-muted);padding:24px;grid-column:1/-1;">Loading sources...</p>
    </div>
  </section>

  <!-- Article list view -->
  <section class="section" id="reader-article-view" style="display:none;">
    <button class="btn btn-outline" id="reader-back" style="margin-bottom:16px;">&larr; All Sources</button>
    <div style="margin-bottom:20px;">
      <span class="section-label" id="reader-source-name"></span>
      <p style="font-size:13px;color:var(--color-text-muted);margin-top:4px;" id="reader-source-stats"></p>
    </div>
    <div class="article-list" id="reader-list">
      <p style="text-align:center;color:var(--color-text-muted);padding:24px;">Loading articles...</p>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/jingtine" target="_blank" rel="noopener">GitHub</a>
      <a href="mailto:251250208@smail.nju.edu.cn">Email</a>
      <a href="feed.xml">RSS</a>
      <a href="status.html">Status</a>
    </div>
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/reader.js"></script>
  <script src="js/site-motion.js?v=20260712-2"></script>

</body>
</html>
