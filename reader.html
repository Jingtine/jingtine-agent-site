<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="RSS Reader — aggregated articles from curated sources.">
  <title>Reader — Jingtine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jingtine</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="knowledge.html">Knowledge</a>
        <a href="library.html">Library</a>
        <a href="reader.html" class="active">Reader</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="section-label">Reader</div>
    <h1>RSS Reader</h1>
    <p>Aggregated articles from curated sources.</p>
  </div>

  <section class="section">
    <div class="reader-filters">
      <div class="reader-filter-row">
        <span class="reader-filter-label">Category</span>
        <div class="reader-tags" id="reader-category-tags">
          <button class="reader-tag reader-tag-active" data-category="">All</button>
          <button class="reader-tag" data-category="ai-agent">AI Agent</button>
          <button class="reader-tag" data-category="software-engineering">Software Engineering</button>
          <button class="reader-tag" data-category="product-thinking">Product Thinking</button>
        </div>
      </div>
      <div class="reader-filter-row">
        <span class="reader-filter-label">Source</span>
        <div class="reader-tags" id="reader-source-tags"></div>
      </div>
    </div>

    <div class="reader-stats" id="reader-stats"></div>
    <div class="reader-list" id="reader-list">
      <p class="reader-empty">Loading articles...</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/reader.js"></script>

</body>
</html>
