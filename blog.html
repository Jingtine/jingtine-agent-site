<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jingtine's blog — thoughts on AI Agent, Software Engineering, and Product Thinking.">
  <title>Blog — Jingtine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jingtine</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="knowledge.html">Knowledge</a>
        <a href="library.html">Library</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="section-label">Blog</div>
    <h1>文章与思考</h1>
    <p>记录 AI Agent 学习、软件工程实践与产品设计心得。</p>
  </div>

  <section class="section">
    <div class="blog-tags" id="blog-tags">
      <button class="blog-tag blog-tag-active" data-category="">All</button>
      <button class="blog-tag" data-category="ai-agent">AI Agent</button>
      <button class="blog-tag" data-category="software-engineering">Software Engineering</button>
      <button class="blog-tag" data-category="product-thinking">Product Thinking</button>
    </div>

    <div class="article-list" id="article-list"></div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    (function () {
      var allArticles = [];
      var currentCategory = getParam('category') || '';

      loadArticleIndex().then(function (articles) {
        allArticles = articles;
        renderList(currentCategory);
        setActiveCategory(currentCategory);
      });

      function renderList(category) {
        var filtered = filterByCategory(allArticles, category);
        renderArticleList('article-list', filtered);
      }

      function setActiveCategory(category) {
        var tags = document.querySelectorAll('#blog-tags .blog-tag');
        for (var i = 0; i < tags.length; i++) {
          var cat = tags[i].getAttribute('data-category');
          if (cat === category) {
            tags[i].classList.add('blog-tag-active');
          } else {
            tags[i].classList.remove('blog-tag-active');
          }
        }
      }

      var tags = document.querySelectorAll('#blog-tags .blog-tag');
      for (var i = 0; i < tags.length; i++) {
        tags[i].addEventListener('click', function () {
          var cat = this.getAttribute('data-category');
          currentCategory = cat;
          renderList(cat);
          setActiveCategory(cat);
        });
      }
    })();
  </script>

</body>
</html>
