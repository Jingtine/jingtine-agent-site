<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Jingtine's blog — thoughts on AI Agent, Software Engineering, and Product Thinking.">
  <title>Blog — Jingtine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jingtine</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html" class="active">Blog</a>
        <a href="knowledge.html">Knowledge</a>
        <a href="library.html">Library</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="section-label">Blog</div>
    <h1>文章与思考</h1>
    <p>记录 AI Agent 学习、软件工程实践与产品设计心得。</p>
  </div>

  <section class="section">
    <div class="blog-categories" id="blog-categories">
      <div class="blog-category-card" data-category="">
        <div class="cat-icon">&#9776;</div>
        <h3>All</h3>
        <p>全部文章</p>
      </div>
      <div class="blog-category-card" data-category="ai-agent">
        <div class="cat-icon">&#9881;</div>
        <h3>AI Agent</h3>
        <p>LLM 应用、Agent 架构、RAG 实践</p>
      </div>
      <div class="blog-category-card" data-category="software-engineering">
        <div class="cat-icon">&#9883;</div>
        <h3>Software Engineering</h3>
        <p>架构设计、工程实践、技术选型</p>
      </div>
      <div class="blog-category-card" data-category="product-thinking">
        <div class="cat-icon">&#9681;</div>
        <h3>Product Thinking</h3>
        <p>产品设计、商业分析、创新方法</p>
      </div>
    </div>

    <div class="article-list" id="article-list"></div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/blog.js"></script>
  <script>
    (function () {
      var allArticles = [];
      var currentCategory = getParam('category') || '';

      loadArticleIndex().then(function (articles) {
        allArticles = articles;
        renderList(currentCategory);
        setActiveCategory(currentCategory);
      });

      function renderList(category) {
        var filtered = filterByCategory(allArticles, category);
        renderArticleList('article-list', filtered);
      }

      function setActiveCategory(category) {
        var cards = document.querySelectorAll('#blog-categories .blog-category-card');
        for (var i = 0; i < cards.length; i++) {
          var cat = cards[i].getAttribute('data-category');
          if (cat === category) {
            cards[i].classList.add('category-active');
          } else {
            cards[i].classList.remove('category-active');
          }
        }
      }

      var cards = document.querySelectorAll('#blog-categories .blog-category-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].addEventListener('click', function () {
          var cat = this.getAttribute('data-category');
          currentCategory = cat;
          renderList(cat);
          setActiveCategory(cat);
        });
      }
    })();
  </script>

</body>
</html>
