<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Assistant — ask questions about Jingtine's personal wiki.">
  <title>Assistant — Jingtine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Jingtine</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="papers.html">Research</a>
        <a href="wiki.html">Wiki</a>
        <a href="reader.html">Reader</a>
        <a href="assistant.html" class="active">Assistant</a>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="section-label">Assistant</div>
    <h1>AI Assistant</h1>
    <p>Ask questions based on my personal wiki knowledge.</p>
  </div>

  <section class="section">
    <div style="display:flex;gap:10px;margin-bottom:28px;">
      <input type="text" id="assistant-input" placeholder="Ask a question about AI, Software, Product..."
        style="flex:1;padding:10px 16px;font-size:14px;font-family:var(--font-sans);border:1px solid var(--color-border);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text);outline:none;">
      <button id="assistant-ask" class="btn btn-primary">Ask</button>
    </div>

    <!-- Observable steps -->
    <div id="assistant-steps" class="contact-card" style="display:none;margin-bottom:20px;">
      <div id="step-search" style="font-size:14px;color:var(--color-text-muted);margin-bottom:6px;"></div>
      <div id="step-retrieve" style="font-size:14px;color:var(--color-text-muted);margin-bottom:6px;"></div>
      <div id="step-generate" style="font-size:14px;color:var(--color-text-muted);"></div>
    </div>

    <!-- Answer area -->
    <div id="assistant-answer" style="display:none;">
      <div class="contact-card" style="margin-bottom:16px;">
        <p id="assistant-answer-text" style="font-size:15px;color:var(--color-text-secondary);line-height:1.8;"></p>
      </div>

      <div id="assistant-sources" style="display:none;">
        <div class="section-label" style="margin-bottom:12px;">Sources</div>
        <div class="article-list" id="assistant-source-list"></div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-links">
      <a href="https://github.com/jingtine" target="_blank" rel="noopener">GitHub</a>
      <a href="mailto:251250208@smail.nju.edu.cn">Email</a>
      <a href="/jingtine-agent-site/feed.xml">RSS</a>
    </div>
    <p>&copy; 2026 Jingtine</p>
  </footer>

  <script src="js/assistant.js"></script>

</body>
</html>
